<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <title>OG Template</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black flex items-center justify-center h-screen">

<div class="relative w-[1200px] h-[630px] overflow-hidden rounded-2xl bg-black text-white">

    <!-- glow -->
    <div class="absolute -top-32 -left-32 w-[500px] h-[500px] bg-teal-500/20 blur-3xl rounded-full"></div>
    <div class="absolute bottom-0 right-0 w-[500px] h-[500px] bg-violet-500/20 blur-3xl rounded-full"></div>

    <!-- subtle grid -->
    <div class="absolute inset-0 opacity-[0.06] bg-[linear-gradient(to_right,white_1px,transparent_1px),linear-gradient(to_bottom,white_1px,transparent_1px)] bg-[size:40px_40px]"></div>

    <!-- content -->
    <div class="relative flex h-full flex-col items-center justify-center text-center px-16">

        <!-- label -->
        <div class="mb-6 text-sm uppercase tracking-widest text-teal-300">
            Clovercode
        </div>

        <!-- naslov -->
        <h1 class="text-5xl font-bold leading-tight">
            Izrada <span class="text-teal-400">web sajtova</span>, <span class="text-violet-400">SEO</span>,
            <br><span class="text-cyan-400">Google Ads</span>
        </h1>

        <!-- opis -->
        <p class="mt-6 max-w-2xl text-lg text-white/70">
            Moderni, brzi i SEO optimizovani sajtovi za vaš biznis
        </p>

    </div>

</div>

</body>
</html>
